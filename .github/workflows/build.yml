name: Build & Verify

# The plugin declares compatibility from build 231 (IntelliJ 2023.1) up to 262.* (2026.2).
# That range is only a CLAIM until the JetBrains Plugin Verifier proves it, so this
# workflow is the gate: nothing ships on an unverified compatibility range.

on:
  push:
    branches: [ main, develop-convergence, 'chore/**', 'feature/**', 'fix/**' ]
  pull_request:
    branches: [ main, develop-convergence ]
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: Build & unit tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # Java 17 matches the project's jvmToolchain in build.gradle.kts.
      # It must be raised to 21 in the same change that migrates to the
      # IntelliJ Platform Gradle Plugin 2.x (2024.2+ requires Java 21).
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - uses: gradle/actions/setup-gradle@v4

      - name: Build plugin
        run: ./gradlew buildPlugin --stacktrace

      - name: Unit tests
        run: ./gradlew test --stacktrace

      - name: Upload test report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-report
          path: build/reports/tests/test
          if-no-files-found: ignore

      - name: Upload plugin distribution
        uses: actions/upload-artifact@v4
        with:
          name: plugin-distribution
          path: build/distributions/*.zip
          if-no-files-found: error

  verify:
    name: Plugin Verifier (231 -> 262)
    runs-on: ubuntu-latest
    needs: build
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - uses: gradle/actions/setup-gradle@v4

      # The Verifier downloads one full IDE per declared branch (several GB).
      # Caching keeps subsequent runs from re-fetching them every time.
      - name: Cache Plugin Verifier IDEs
        uses: actions/cache@v4
        with:
          path: ~/.pluginVerifier/ides
          key: plugin-verifier-ides-${{ hashFiles('build.gradle.kts') }}
          restore-keys: plugin-verifier-ides-

      - name: Verify plugin structure
        run: ./gradlew verifyPlugin --stacktrace

      - name: Run Plugin Verifier
        run: ./gradlew runPluginVerifier --stacktrace

      - name: Upload verifier report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: plugin-verifier-report
          path: build/reports/pluginVerifier
          if-no-files-found: ignore
