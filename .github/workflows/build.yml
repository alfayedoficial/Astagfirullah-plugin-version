name: Build & Verify

# The plugin declares compatibility from build 242 (IntelliJ 2024.2) up to 262.* (2026.2).
# That range is only a CLAIM until the JetBrains Plugin Verifier proves it, so this
# workflow is the gate: nothing ships on an unverified compatibility range.

on:
  push:
    branches: [ main, develop-convergence, 'chore/**', 'feature/**', 'fix/**' ]
  pull_request:
    branches: [ main, develop-convergence ]
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  # Cancel superseded runs on feature/PR branches, but NEVER on the integration
  # branches. Every merge into develop-convergence/main must produce a verdict:
  # previously each merge cancelled the one before it, so three merges in a row all
  # ended "cancelled" and the merged code went unverified until dispatched by hand.
  cancel-in-progress: >-
    ${{ github.ref != 'refs/heads/develop-convergence' && github.ref != 'refs/heads/main' }}

jobs:
  build:
    name: Build & unit tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # Java 21: IntelliJ Platform 2024.2+ requires it, and the project's jvmToolchain
      # is set to 21 since the IntelliJ Platform Gradle Plugin 2.x migration.
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'

      - uses: gradle/actions/setup-gradle@v4

      - name: Build plugin
        run: ./gradlew buildPlugin --stacktrace

      # NON-BLOCKING, deliberately and temporarily.
      # 108 of 753 tests already fail on the branch point (4a7461f) -- verified in an
      # isolated worktree -- because this repo has never had CI to catch the rot.
      # Hard-failing here would make the pipeline permanently red on day one and, worse,
      # would skip the Plugin Verifier below, which is the job that actually proves the
      # declared 232->262 compatibility range.
      # Results are still uploaded and visible. Remove continue-on-error once the 108
      # pre-existing failures are triaged -- do NOT let this become the permanent state.
      - name: Unit tests (non-blocking until pre-existing failures are triaged)
        continue-on-error: true
        run: ./gradlew test --stacktrace

      - name: Upload test report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-report
          path: build/reports/tests/test
          if-no-files-found: ignore

      - name: Upload plugin distribution
        uses: actions/upload-artifact@v4
        with:
          name: plugin-distribution
          path: build/distributions/*.zip
          if-no-files-found: error

  verify:
    # ONE IDE PER JOB, deliberately.
    # Verifying all ten on a single runner died with "No space left on device": each
    # IntelliJ download is over a gigabyte and a hosted runner has ~14 GB free. A matrix
    # gives every IDE a fresh disk, runs them in parallel, and makes a failure point at
    # one specific IDE rather than the whole batch.
    name: Verify ${{ matrix.ide }}
    runs-on: ubuntu-latest
    needs: build
    strategy:
      fail-fast: false # one bad IDE must not hide the results for the others
      matrix:
        ide:
          - '2024.2.5' # sinceBuild floor (242)
          - '2024.3.5'
          - '2025.1'
          - '2025.2'
          - '2025.3'
          - '2026.1'
          - '2026.2' # untilBuild ceiling (262)
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'

      - uses: gradle/actions/setup-gradle@v4

      # The Verifier downloads one full IDE per declared branch (several GB).
      # Caching keeps subsequent runs from re-fetching them every time.
      - name: Cache Plugin Verifier IDEs
        uses: actions/cache@v4
        with:
          path: ~/.pluginVerifier/ides
          key: plugin-verifier-ide-${{ matrix.ide }}

      # 2.x task names: verifyPluginProjectConfiguration checks the setup,
      # verifyPlugin IS the JetBrains Plugin Verifier (1.x called it runPluginVerifier).
      - name: Verify plugin project configuration
        run: ./gradlew verifyPluginProjectConfiguration --stacktrace

      - name: Run Plugin Verifier
        run: ./gradlew verifyPlugin -PpluginVerifierIdeVersions=${{ matrix.ide }} --stacktrace

      - name: Upload verifier report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: plugin-verifier-report-${{ matrix.ide }}
          path: build/reports/pluginVerifier
          if-no-files-found: ignore
