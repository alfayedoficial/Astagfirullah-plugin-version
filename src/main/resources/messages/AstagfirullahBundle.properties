# Plugin display information
plugin.name=Astagfirullah
plugin.description=<p>This plugin helps utilize waiting time for remembrance, seeking forgiveness, glorification, and sending blessings upon the Prophet Muhammad (peace be upon him).</p>\
  <p><strong>Mention me in your good deeds</strong></p>\
  <p><b>Developer:</b> Ali Al-Shahat Ali</p>\
  <p><b>Contact me:</b> <a href="https://www.linkedin.com/in/alfayedoficial/">Linkedin Account</a></p>\
  <hr>\
  <p><b>Features:</b></p>\
  <ul>\
    <li>Features remembrance, seeking forgiveness, glorification, and sending blessings upon the Prophet Muhammad (peace be upon him).</li>\
    <li>Utilizes waiting time for beneficial practices.</li>\
    <li>Play sound "\\u0635\\u0644\\u0649 \\u0639\\u0644\\u0649 \\u0633\\u064A\\u062F\\u0646\\u0627 \\u0645\\u062D\\u0645\\u062F" during progress tasks.</li>\
    <li>Support multi-language: "\\u0627\\u0644\\u0639\\u0631\\u0628\\u064A\\u0629", "English", "\\u0623\\u0648\\u0631\\u062F\\u0648", "\\u0641\\u0627\\u0631\\u0633\\u0649"</li>\
    <li>1.5 Sec for reading</li>\
    <li>Display 5 random count of phrases</li>\
    <li>Option to enable or disable sound </li>\
    <li>Reminder for rating plugin</li>\
  </ul>

